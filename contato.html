<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | FMtic - Consultoria em TI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="images/favicon.svg"> <!-- ou .png se preferir -->
    <!-- jQuery para carregar header e footer -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
</head>

<body>

    <div id="header-placeholder"></div>
    <section class="formulario">
        <div class="container">
            <h1 class="contato-title">Solicite seu diagnóstico de TI gratuito</h1>
            <p>Preencha as informações abaixo e nossa equipe entrará em contato em breve.</p>
            <form action="https://formsubmit.co/f5c0a4fc0b77342a8facb045f26ba4a0" method="POST" id="contatoForm">
                <input type="text" placeholder="Seu nome" required>
                <input type="email" placeholder="Seu e-mail" required>
                <input type="text" placeholder="Empresa">
                <textarea placeholder="Descreva seu problema ou necessidade de TI" required></textarea>
                <input type="hidden" name="_captcha" value="false"> <!-- desativa captcha interno do Formsubmit -->


                <!-- reCAPTCHA -->
                <div class="g-recaptcha" data-sitekey="6LdoYZAsAAAAAM1yyj_pGwCOJEzAt7EuZH6jBUUF"></div>


                <button type="submit" class="btn">Enviar Mensagem</button>
            </form>
            <script src="https://www.google.com/recaptcha/api.js" async defer></script>

        </div>
    </section>
    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>

</body>

</html>
